name: Cloud IDE + Ollama + Tailscale

on:
  workflow_dispatch:

jobs:
  cloud-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Create User + SSH
        run: |
          PASSWORD=$(tr -dc A-Za-z0-9 < /dev/urandom | head -c20)
          echo "SSH_PASSWORD=$PASSWORD" >> $GITHUB_ENV

          sudo useradd -m -s /bin/bash devuser
          echo "devuser:$PASSWORD" | sudo chpasswd
          sudo usermod -aG sudo,docker devuser

          sudo apt update
          sudo apt install -y openssh-server curl git npm
          sudo systemctl enable ssh
          sudo systemctl start ssh

          if ! command -v docker &> /dev/null; then
            sudo apt install -y docker.io --allow-downgrades
          fi
          sudo systemctl enable docker
          sudo systemctl start docker

      - name: Install code-server
        run: |
          curl -fsSL https://code-server.dev/install.sh | sh

          PASSWORD=$(openssl rand -base64 12)

          sudo -u devuser mkdir -p /home/devuser/.config/code-server

          sudo -u devuser tee /home/devuser/.config/code-server/config.yaml <<EOF
          bind-addr: 0.0.0.0:8080
          auth: password
          password: $PASSWORD
          cert: false
          EOF

          sudo -u devuser nohup code-server >/tmp/code-server.log 2>&1 &

          echo "CODE_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          sudo systemctl enable ollama
          sudo systemctl start ollama
          sleep 5
          ollama pull qwen2.5-coder:1.5b
          ollama pull phi

      - name: Setup Claude Alias
        run: |
          sudo -u devuser bash -c "echo \"alias cq='ollama launch claude --model qwen2.5-coder:1.5b'\" >> ~/.bashrc"
          sudo -u devuser bash -c "source ~/.bashrc"

      - name: Install Claude CLI
        run: |
          npm install -g @anthropic-ai/claude-code || true

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Start Tailscale
        run: |
          sudo tailscale up \
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --ssh \
            --hostname=cloud-ide-${GITHUB_RUN_ID}

          TS_IP=$(tailscale ip -4 | head -n1)
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Access Details
        run: |
          echo ""
          echo "=============================="
          echo "SSH: $TAILSCALE_IP"
          echo "User: devuser"
          echo "Pass: $SSH_PASSWORD"
          echo ""
          echo "VS Code:"
          echo "http://$TAILSCALE_IP:8080"
          echo "Pass: $CODE_PASSWORD"
          echo ""
          echo "Ollama API:"
          echo "http://$TAILSCALE_IP:11434"
          echo ""
          echo "Run Claude Code:"
          echo "cq"
          echo "=============================="

      - name: Keep Alive
        run: |
          while true; do
            echo "[$(date)] active"
            sleep 60
          done

